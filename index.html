<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>\uae00 \u2192 \uc774\ubbf8\uc9c0 \ubcc0\ud658\uae30</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=Pretendard:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Gothic:wght@400;700;800&family=Gothic+A1:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --border: #e2ddd5;
    --text: #2c2825;
    --text-sub: #8a837a;
    --accent: #6b5c4d;
    --accent-hover: #5a4d40;
    --input-bg: #fafaf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--bg); border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .editor-panel {
    width: 420px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .settings-toggle {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    transition: background 0.15s;
  }

  .settings-toggle:hover { background: var(--bg); }
  .settings-toggle .arrow { transition: transform 0.2s; font-size: 11px; }
  .settings-toggle .arrow.open { transform: rotate(180deg); }

  .settings-panel {
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }

  .settings-panel.open { max-height: 600px; }

  .settings-inner {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .setting-row label {
    font-size: 12px;
    color: var(--text-sub);
    min-width: 70px;
    flex-shrink: 0;
  }

  .setting-row select,
  .setting-row input[type="number"] {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--input-bg);
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .setting-row select:focus,
  .setting-row input:focus { border-color: var(--accent); }

  .color-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-input-wrap input[type="color"] {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    padding: 2px;
    background: var(--input-bg);
  }

  .color-input-wrap .hex {
    font-size: 12px;
    color: var(--text-sub);
    font-family: 'IBM Plex Sans KR', monospace;
  }

  .textarea-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  .textarea-wrap textarea {
    flex: 1;
    padding: 20px;
    border: none;
    resize: none;
    font-size: 14px;
    line-height: 1.8;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: transparent;
    outline: none;
    min-height: 300px;
  }

  .textarea-wrap textarea::placeholder {
    color: var(--text-sub);
    opacity: 0.6;
  }

  .preview-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    background: var(--bg);
  }

  .page-canvas {
    background: #fff;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    border-radius: 2px;
    position: relative;
    flex-shrink: 0;
  }

  .page-number {
    position: absolute;
    bottom: 0;
    right: 0;
    font-size: 13px;
    color: #999;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    color: var(--text-sub);
    gap: 8px;
  }

  .empty-state .icon { font-size: 40px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  .page-info {
    font-size: 12px;
    color: var(--text-sub);
    text-align: center;
  }

  .save-hint {
    font-size: 11px;
    color: var(--text-sub);
    opacity: 0.7;
    text-align: center;
    padding: 4px 0 16px;
  }

  .setting-row input[type="number"] { width: 80px; flex: none; }

  .setting-group-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-sub);
    opacity: 0.6;
    margin-top: 4px;
  }

  .size-preset-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .size-preset {
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    background: var(--input-bg);
    color: var(--text-sub);
    transition: all 0.15s;
  }

  .size-preset:hover, .size-preset.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #f5f0eb;
  }

  @media (max-width: 800px) {
    .main { flex-direction: column; }
    .editor-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); }
    .textarea-wrap textarea { min-height: 180px; }
    .preview-panel { padding: 20px 12px; }
    .page-canvas { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>\uae00 \u2192 \uc774\ubbf8\uc9c0</h1>
    <div class="header-actions">
      <button class="btn" onclick="resetSettings()">\ucd08\uae30\ud654</button>
    </div>
  </header>

  <div class="main">
    <div class="editor-panel">
      <div class="settings-toggle" onclick="toggleSettings()">
        <span>\uc124\uc815</span>
        <span class="arrow" id="settingsArrow">\u25bc</span>
      </div>
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-inner">
          <div class="setting-group-title">\ud398\uc774\uc9c0</div>
          <div class="size-preset-row" id="sizePresets"></div>
          <div class="setting-row">
            <label>\ub108\ube44 (px)</label>
            <input type="number" id="pageWidth" min="200" max="3000" step="10">
          </div>
          <div class="setting-row">
            <label>\ub192\uc774 (px)</label>
            <input type="number" id="pageHeight" min="200" max="4000" step="10">
          </div>
          <div class="setting-row">
            <label>\uc5ec\ubc31 (px)</label>
            <input type="number" id="pagePadding" min="10" max="300" step="5">
          </div>

          <div class="setting-group-title">\uae00\uaf34</div>
          <div class="setting-row">
            <label>\ud3f0\ud2b8</label>
            <select id="fontFamily"></select>
          </div>
          <div class="setting-row">
            <label>\ud06c\uae30 (px)</label>
            <input type="number" id="fontSize" min="8" max="80" step="1">
          </div>
          <div class="setting-row">
            <label>\uc904 \uac04\uaca9</label>
            <input type="number" id="lineHeight" min="1" max="4" step="0.1">
          </div>
          <div class="setting-row">
            <label>\uc790\uac04 (px)</label>
            <input type="number" id="letterSpacing" min="-3" max="10" step="0.1">
          </div>
          <div class="setting-row">
            <label>\ub2e8\ub77d\uac04\uaca9 (px)</label>
            <input type="number" id="paragraphSpacing" min="0" max="100" step="1">
          </div>
          <div class="setting-row">
            <label>\uccab\uc904 \ub4e4\uc5ec\uc4f0\uae30</label>
            <input type="number" id="textIndent" min="0" max="100" step="1">
          </div>

          <div class="setting-group-title">\uc0c9\uc0c1</div>
          <div class="setting-row">
            <label>\ubc30\uacbd\uc0c9</label>
            <div class="color-input-wrap">
              <input type="color" id="bgColor">
              <span class="hex" id="bgHex"></span>
            </div>
          </div>
          <div class="setting-row">
            <label>\uae00\uc790\uc0c9</label>
            <div class="color-input-wrap">
              <input type="color" id="textColor">
              <span class="hex" id="textHex"></span>
            </div>
          </div>

          <div class="setting-group-title">\ud398\uc774\uc9c0 \ubc88\ud638</div>
          <div class="setting-row">
            <label>\ud45c\uc2dc</label>
            <select id="showPageNum">
              <option value="true">\ud45c\uc2dc</option>
              <option value="false">\uc228\uae30\uae30</option>
            </select>
          </div>
          <div class="setting-row">
            <label>\uc2dc\uc791 \ubc88\ud638</label>
            <input type="number" id="startPageNum" min="1" max="9999" step="1">
          </div>
        </div>
      </div>

      <div class="textarea-wrap">
        <textarea id="textInput" placeholder="\uc5ec\uae30\uc5d0 \uae00\uc744 \uc785\ub825\ud558\uc138\uc694...&#10;&#10;\ub0b4\uc6a9\uc774 \uae38\uc5b4\uc9c0\uba74 \uc790\ub3d9\uc73c\ub85c \ub2e4\uc74c \ud398\uc774\uc9c0\uac00 \ub9cc\ub4e4\uc5b4\uc9d1\ub2c8\ub2e4.&#10;\uc0dd\uc131\ub41c \uc774\ubbf8\uc9c0\ub97c \uafb9 \ub20c\ub7ec\uc11c(PC\ub294 \uc6b0\ud074\ub9ad) \uc800\uc7a5\ud558\uc138\uc694."></textarea>
      </div>
    </div>

    <div class="preview-panel" id="previewPanel">
      <div class="empty-state" id="emptyState">
        <div class="icon">\ud83d\udcc4</div>
        <p>\uc67c\ucabd\uc5d0 \uae00\uc744 \uc785\ub825\ud558\uba74 \uc774\ubbf8\uc9c0\uac00 \uc0dd\uc131\ub429\ub2c8\ub2e4</p>
      </div>
    </div>
  </div>
</div>

<script>
const FONTS = [
  { name: 'Noto Serif KR', label: '\ubcf8\uba85\uc870 (Noto Serif)' },
  { name: 'Nanum Myeongjo', label: '\ub098\ub214\uba85\uc870' },
  { name: 'Gowun Batang', label: '\uace0\uc6b4\ubc14\ud0d5' },
  { name: 'Noto Sans KR', label: '\ubcf8\uace0\ub515 (Noto Sans)' },
  { name: 'Nanum Gothic', label: '\ub098\ub214\uace0\ub515' },
  { name: 'Gowun Dodum', label: '\uace0\uc6b4\ub3cb\uc6c0' },
  { name: 'IBM Plex Sans KR', label: 'IBM Plex Sans' },
  { name: 'Gothic A1', label: 'Gothic A1' },
  { name: 'Pretendard', label: 'Pretendard' },
];

const SIZE_PRESETS = [
  { label: '\uc778\uc2a4\ud0c0 \uc815\ubc29', w: 1080, h: 1080 },
  { label: '\uc778\uc2a4\ud0c0 \uc138\ub85c', w: 1080, h: 1350 },
  { label: 'A4 \ube44\uc728', w: 816, h: 1056 },
  { label: '\ud2b8\uc704\ud130', w: 1200, h: 675 },
  { label: '\ucc45 \ud398\uc774\uc9c0', w: 700, h: 1000 },
];

const DEFAULTS = {
  pageWidth: 700,
  pageHeight: 1000,
  pagePadding: 70,
  fontFamily: 'Noto Serif KR',
  fontSize: 22,
  lineHeight: 2.0,
  letterSpacing: -0.3,
  paragraphSpacing: 20,
  textIndent: 20,
  bgColor: '#ffffff',
  textColor: '#333333',
  showPageNum: 'true',
  startPageNum: 1,
};

let settings = { ...DEFAULTS };
let debounceTimer = null;

function loadSettings() {
  try {
    const saved = localStorage.getItem('textToImageSettings');
    if (saved) settings = { ...DEFAULTS, ...JSON.parse(saved) };
  } catch(e) {}
}

function saveSettings() {
  try { localStorage.setItem('textToImageSettings', JSON.stringify(settings)); } catch(e) {}
}

function resetSettings() {
  settings = { ...DEFAULTS };
  saveSettings();
  applySettingsToUI();
  render();
}

function applySettingsToUI() {
  document.getElementById('pageWidth').value = settings.pageWidth;
  document.getElementById('pageHeight').value = settings.pageHeight;
  document.getElementById('pagePadding').value = settings.pagePadding;
  document.getElementById('fontSize').value = settings.fontSize;
  document.getElementById('lineHeight').value = settings.lineHeight;
  document.getElementById('letterSpacing').value = settings.letterSpacing;
  document.getElementById('paragraphSpacing').value = settings.paragraphSpacing;
  document.getElementById('textIndent').value = settings.textIndent;
  document.getElementById('bgColor').value = settings.bgColor;
  document.getElementById('textColor').value = settings.textColor;
  document.getElementById('bgHex').textContent = settings.bgColor;
  document.getElementById('textHex').textContent = settings.textColor;
  document.getElementById('showPageNum').value = settings.showPageNum;
  document.getElementById('startPageNum').value = settings.startPageNum;

  const fontSelect = document.getElementById('fontFamily');
  fontSelect.value = settings.fontFamily;

  updateSizePresetActive();
}

function updateSizePresetActive() {
  document.querySelectorAll('.size-preset').forEach(el => {
    const w = parseInt(el.dataset.w), h = parseInt(el.dataset.h);
    el.classList.toggle('active', w === settings.pageWidth && h === settings.pageHeight);
  });
}

function initUI() {
  // Fonts
  const fontSelect = document.getElementById('fontFamily');
  FONTS.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.name;
    opt.textContent = f.label;
    opt.style.fontFamily = `'${f.name}'`;
    fontSelect.appendChild(opt);
  });

  // Size presets
  const presetRow = document.getElementById('sizePresets');
  SIZE_PRESETS.forEach(p => {
    const btn = document.createElement('div');
    btn.className = 'size-preset';
    btn.textContent = p.label;
    btn.dataset.w = p.w;
    btn.dataset.h = p.h;
    btn.onclick = () => {
      settings.pageWidth = p.w;
      settings.pageHeight = p.h;
      document.getElementById('pageWidth').value = p.w;
      document.getElementById('pageHeight').value = p.h;
      updateSizePresetActive();
      saveSettings();
      render();
    };
    presetRow.appendChild(btn);
  });

  // Bind inputs
  const bindings = [
    ['pageWidth', 'pageWidth', 'int'],
    ['pageHeight', 'pageHeight', 'int'],
    ['pagePadding', 'pagePadding', 'int'],
    ['fontFamily', 'fontFamily', 'str'],
    ['fontSize', 'fontSize', 'int'],
    ['lineHeight', 'lineHeight', 'float'],
    ['letterSpacing', 'letterSpacing', 'float'],
    ['paragraphSpacing', 'paragraphSpacing', 'int'],
    ['textIndent', 'textIndent', 'int'],
    ['bgColor', 'bgColor', 'str'],
    ['textColor', 'textColor', 'str'],
    ['showPageNum', 'showPageNum', 'str'],
    ['startPageNum', 'startPageNum', 'int'],
  ];

  bindings.forEach(([id, key, type]) => {
    const el = document.getElementById(id);
    const event = el.tagName === 'SELECT' || el.type === 'color' ? 'change' : 'input';
    el.addEventListener(event, () => {
      const v = type === 'int' ? parseInt(el.value) : type === 'float' ? parseFloat(el.value) : el.value;
      settings[key] = v;
      if (id === 'bgColor') document.getElementById('bgHex').textContent = v;
      if (id === 'textColor') document.getElementById('textHex').textContent = v;
      if (id === 'pageWidth' || id === 'pageHeight') updateSizePresetActive();
      saveSettings();
      debouncedRender();
    });
  });

  document.getElementById('textInput').addEventListener('input', debouncedRender);
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const arrow = document.getElementById('settingsArrow');
  panel.classList.toggle('open');
  arrow.classList.toggle('open');
}

function debouncedRender() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 200);
}

function splitTextIntoPages(text) {
  const paragraphs = text.split('\n');
  const pages = [];

  const {
    pageWidth, pageHeight, pagePadding, fontFamily,
    fontSize, lineHeight: lh, letterSpacing, paragraphSpacing, textIndent
  } = settings;

  const contentWidth = pageWidth - pagePadding * 2;
  const contentHeight = pageHeight - pagePadding * 2;
  const lineHeightPx = fontSize * lh;

  // Use a hidden measurement div
  let measureDiv = document.getElementById('measureDiv');
  if (!measureDiv) {
    measureDiv = document.createElement('div');
    measureDiv.id = '
